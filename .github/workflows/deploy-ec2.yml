name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_ci:
        description: 'Skip CI checks and deploy directly'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  # ── Gate: reuse existing CI checks ──────────────────────────
  ci:
    if: ${{ github.event.inputs.skip_ci != 'true' }}
    uses: ./.github/workflows/ci.yml

  # ── Deploy to EC2 ───────────────────────────────────────────
  deploy:
    needs: [ci]
    if: |
      always() &&
      (needs.ci.result == 'success' || github.event.inputs.skip_ci == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          HUSKY: '0'
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 8m
          envs: HUSKY
          script: |
            set -euo pipefail

            echo "══════════════════════════════════════════"
            echo "  Nova Quant EC2 Deploy"
            echo "  $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "══════════════════════════════════════════"

            cd /opt/nova-quant

            # ── Pull latest code ──
            echo ""
            echo "▸ Pulling latest code..."
            git fetch origin main
            BEFORE=$(git rev-parse HEAD)
            git reset --hard origin/main
            AFTER=$(git rev-parse HEAD)
            echo "  Before: ${BEFORE:0:8}"
            echo "  After:  ${AFTER:0:8}"

            if [ "$BEFORE" = "$AFTER" ]; then
              echo "  ⚠ No changes detected, deploying anyway."
            fi

            # ── Install dependencies ──
            echo ""
            echo "▸ Installing dependencies..."
            npm ci 2>&1 | tail -5

            # ── Sync systemd units from repo ──
            echo ""
            echo "▸ Syncing systemd units..."
            sudo cp deployment/aws-ec2/marvix.service /etc/systemd/system/marvix.service
            sudo cp deployment/aws-ec2/marvix-backend.service /etc/systemd/system/marvix-backend.service
            sudo cp qlib-bridge/deployment/nova-qlib-bridge.service /etc/systemd/system/nova-qlib-bridge.service
            sudo systemctl daemon-reload

            # ── Build frontend ──
            echo ""
            echo "▸ Building frontend..."
            npm run build 2>&1 | tail -5

            # ── Restart services ──
            echo ""
            echo "▸ Restarting services..."
            sudo systemctl restart marvix.service
            sleep 5
            sudo systemctl restart marvix-backend.service
            sleep 5
            sudo systemctl restart nova-qlib-bridge.service
            sleep 10

            # ── Health check ──
            echo ""
            echo "▸ Health check..."
            MARVIX_STATUS=$(sudo systemctl is-active marvix.service || true)
            BACKEND_STATUS=$(sudo systemctl is-active marvix-backend.service || true)
            QLIB_STATUS=$(sudo systemctl is-active nova-qlib-bridge.service || true)

            echo "  marvix.service:             $MARVIX_STATUS"
            echo "  marvix-backend.service:     $BACKEND_STATUS"
            echo "  nova-qlib-bridge.service:   $QLIB_STATUS"

            if [ "$MARVIX_STATUS" != "active" ] || [ "$BACKEND_STATUS" != "active" ] || [ "$QLIB_STATUS" != "active" ]; then
              echo ""
              echo "✖ DEPLOY FAILED — services not healthy"
              echo "── marvix.service logs ──"
              sudo journalctl -u marvix.service --no-pager -n 15
              echo "── marvix-backend.service logs ──"
              sudo journalctl -u marvix-backend.service --no-pager -n 15
              echo "── nova-qlib-bridge.service logs ──"
              sudo journalctl -u nova-qlib-bridge.service --no-pager -n 30
              exit 1
            fi

            # ── Verify API responds ──
            HTTP_CODE=""
            for attempt in 1 2 3 4 5 6; do
              HTTP_CODE=$(curl -sS -o /tmp/nova-healthz.json -w "%{http_code}" http://127.0.0.1:8787/healthz --max-time 5 || true)
              echo "  healthz attempt ${attempt}: ${HTTP_CODE:-<empty>}"
              if [ "$HTTP_CODE" = "200" ]; then
                break
              fi
              sleep 5
            done

            echo "  API HTTP response:      ${HTTP_CODE:-<empty>}"

            if [ "$HTTP_CODE" != "200" ]; then
              echo "✖ DEPLOY FAILED — API healthz not responding"
              echo "── healthz body ──"
              cat /tmp/nova-healthz.json 2>/dev/null || true
              echo
              echo "── marvix.service logs ──"
              sudo journalctl -u marvix.service --no-pager -n 20
              exit 1
            fi

            echo ""
            echo "══════════════════════════════════════════"
            echo "  ✔ Deploy successful"
            echo "  Commit: ${AFTER:0:8}"
            echo "  $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "══════════════════════════════════════════"
